<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gravity Watercolor</title>

<style>

body{
margin:0;
overflow:hidden;
background:#eae7df;
}

/* 紙テクスチャ */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://www.transparenttextures.com/patterns/paper-fibers.png");
opacity:0.35;
pointer-events:none;
}

canvas{
display:block;
}

#permission{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:14px 20px;
background:#222;
color:white;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="permission">タップして傾きセンサーを有効化</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let drops = []

let gravityX = 0
let gravityY = 0


function createDrop(x,y){

drops.push({

x:x,
y:y,

vx:0,
vy:0,

size:25 + Math.random()*15,

alpha:1

})

}


// タップでインク
canvas.addEventListener("touchstart",(e)=>{

let t = e.touches[0]
createDrop(t.clientX,t.clientY)

})



// 傾き許可
function enableOrientation(){

if (typeof DeviceOrientationEvent.requestPermission === "function"){

DeviceOrientationEvent.requestPermission().then(permissionState => {

if(permissionState === "granted"){

window.addEventListener("deviceorientation",handleOrientation)

}

})

}else{

window.addEventListener("deviceorientation",handleOrientation)

}

}


function handleOrientation(event){

gravityX = event.gamma * 0.002
gravityY = event.beta * 0.002

}


document.getElementById("permission").onclick = ()=>{

enableOrientation()
document.getElementById("permission").style.display="none"

}



// 描画ループ
function draw(){

// 軌跡フェード
ctx.fillStyle="rgba(234,231,223,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)


drops.forEach(d=>{

// 重力
d.vx += gravityX
d.vy += gravityY


// 移動
d.x += d.vx
d.y += d.vy


// 抵抗
d.vx *= 0.96
d.vy *= 0.96


// 水彩拡散
d.size += 0.02


// 薄くなる
d.alpha -= 0.001


let gradient = ctx.createRadialGradient(
d.x,d.y,0,
d.x,d.y,d.size
)

gradient.addColorStop(0,`rgba(30,30,30,${d.alpha})`)
gradient.addColorStop(1,`rgba(30,30,30,0)`)

ctx.fillStyle = gradient

ctx.beginPath()
ctx.arc(d.x,d.y,d.size,0,Math.PI*2)
ctx.fill()

})


drops = drops.filter(d=>d.alpha>0)

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
