<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gravity Brush</title>

<style>

body{
margin:0;
overflow:hidden;
background:#ffffff;
}

/* 白い紙テクスチャ */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("https://www.transparenttextures.com/patterns/paper-fibers.png");
opacity:0.12;
pointer-events:none;
}

canvas{
display:block;
}

#permission{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:14px 20px;
background:#222;
color:white;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>
<div id="permission">タップして傾きセンサーを有効化</div>

<script>

const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let drops = []

let gravityX = 0
let gravityY = 0


function createDrop(x,y){

drops.push({

x:x,
y:y,

px:x,
py:y,

vx:0,
vy:0,

size:26 + Math.random()*12,

alpha:1

})

}


// タップでインク

canvas.addEventListener("touchstart",(e)=>{

let t = e.touches[0]

createDrop(t.clientX,t.clientY)

})



// 傾き許可

function enableOrientation(){

if (typeof DeviceOrientationEvent.requestPermission === "function"){

DeviceOrientationEvent.requestPermission().then(permissionState => {

if(permissionState === "granted"){

window.addEventListener("deviceorientation",handleOrientation)

}

})

}else{

window.addEventListener("deviceorientation",handleOrientation)

}

}



function handleOrientation(event){

let beta = event.beta
let gamma = event.gamma

/* かなり弱い重力 */

gravityX = gamma * 0.0012
gravityY = beta * 0.0012

}



document.getElementById("permission").onclick = ()=>{

enableOrientation()
document.getElementById("permission").style.display="none"

}



// 描画ループ

function draw(){

/* 軌跡フェード */

ctx.fillStyle="rgba(255,255,255,0.01)"
ctx.fillRect(0,0,canvas.width,canvas.height)



drops.forEach(d=>{

d.px = d.x
d.py = d.y

/* ゆっくり流れる */

d.vx += gravityX
d.vy += gravityY

d.x += d.vx
d.y += d.vy

/* 慣性強め */

d.vx *= 0.992
d.vy *= 0.992

/* 水彩拡散 */

d.size += 0.03

/* フェード */

d.alpha -= 0.0006



ctx.beginPath()

ctx.moveTo(d.px,d.py)
ctx.lineTo(d.x,d.y)

ctx.lineWidth = d.size
ctx.lineCap = "round"

ctx.strokeStyle = `rgba(20,20,20,${d.alpha})`

ctx.stroke()

})


drops = drops.filter(d=>d.alpha>0)

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
